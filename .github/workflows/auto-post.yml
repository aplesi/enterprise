name: Auto Post Artikel AI

on:
  schedule:
    # Jalan setiap hari jam 00:00 UTC (07:00 WIB)
    - cron: '0 0 * * *'
  workflow_dispatch: # Memungkinkan trigger manual

jobs:
  auto-generate-post:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dibutuhkan untuk push commit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Cukup commit terakhir saja

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Jalankan Script Auto Post
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: node scripts/auto-post.mjs

      - name: Commit dan Push Perubahan
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/artikel/ public/images/artikel/
          
          # Cek jika ada file yang di-stage
          if git diff --staged --quiet; then
            echo "Tidak ada artikel baru untuk di-commit"
            exit 0
          fi
          
          git commit -m "feat: auto-generate artikel AI $(date +'%Y-%m-%d')"
          git push
