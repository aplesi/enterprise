name: Generate Artikel Recap dari Berita

on:
  schedule:
    # Jalan tiap 3 jam
    - cron: '0 */3 * * *'
  workflow_dispatch: # Memungkinkan trigger manual

jobs:
  generate-berita-artikel:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Dibutuhkan untuk push commit

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Jalankan Script Generate Berita
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
        run: node scripts/generate-berita-artikel.mjs

      - name: Commit dan Push Perubahan
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add content/artikel/ public/images/artikel/

          if git diff --staged --quiet; then
            echo "Tidak ada artikel recap baru untuk di-commit"
            exit 0
          fi

          git commit -m "feat: auto-generate artikel recap berita $(date +'%Y-%m-%d %H:%M')"
          git push
