name: Deploy ke Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Data Artikel
        run: npm run generate:artikel

      - name: Build untuk Cloudflare Pages (OpenNext)
        run: npm run pages:build
        env:
          NODE_ENV: production
          SKIP_WRANGLER_CONFIG_CHECK: "yes"

      - name: Rename wrangler.jsonc (avoid Worker/Pages conflict)
        run: mv wrangler.jsonc wrangler.jsonc.bak

      - name: Deploy ke Cloudflare Pages
        run: npx wrangler pages deploy .open-next --project-name=enterprise --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

      - name: Restore wrangler.jsonc
        run: mv wrangler.jsonc.bak wrangler.jsonc
        if: always()
