name: Deploy ke Cloudflare Worker

on:
  push:
    branches: [main]
  workflow_dispatch:
  workflow_call: # Dipanggil otomatis oleh auto-post.yml setelah artikel baru di-commit

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Data Artikel
        run: npm run generate:artikel

      - name: Build OpenNext
        run: npm run pages:build
        env:
          NODE_ENV: production
          SKIP_WRANGLER_CONFIG_CHECK: "yes"

      - name: Deploy Worker (static assets + server functions)
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
